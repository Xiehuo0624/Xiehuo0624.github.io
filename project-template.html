<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PROJECT</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/project.css">
<link rel="preload" as="font" type="font/woff2" crossorigin href="css/fonts/SourceHanSansSC-Regular.woff2">
<!-- core（defer：并行下载、按序执行、不阻塞渲染） -->
<script defer src="js/app.js"></script>
<script defer src="js/i18n.js"></script>
<script defer src="js/i18n-common.js"></script>
<script defer src="js/autospace.js"></script>
<script defer src="js/nav.js"></script>
<script defer src="js/prefetch.js"></script>
<!-- page data + logic -->
<script defer src="js/project-i18n.js"></script>
<script defer src="js/project-data.js"></script>
<script defer src="js/audio-wwhbh.js"></script>
<script defer src="js/project.js"></script>
</head>
<body>

<!-- default grid layout -->
<div class="project-grid" id="layout-grid">
  <div class="media-area" id="grid-media">
    <span class="media-placeholder" data-i18n="mediaHint">[ 演示视频 / 硬件照片 ]</span>
  </div>
  <div class="info-area">
    <h2 id="grid-title"></h2>
    <p id="grid-desc"></p>
  </div>
</div>

<!-- wwbh: text + mic button -->
<div class="wwhbh-panel" id="layout-wwhbh">
  <div class="wwhbh-body">
    <h2 id="wwhbh-title"></h2>
    <p id="wwhbh-desc"></p>
  </div>
  <div class="wwhbh-footer">
    <button class="btn-mic" id="btn-mic" data-i18n="btnActivate">ACTIVATE</button>
  </div>
</div>

<!-- ecce: top image (+ optional audio) + text -->
<div class="ecce-panel" id="layout-ecce">
  <h2 id="ecce-title"></h2>
  <div class="ecce-media" id="ecce-media"></div>
  <div class="ecce-text">
    <p id="ecce-desc"></p>
  </div>
</div>

<!-- edge: video on top, text below -->
<div class="edge-panel" id="layout-edge">
  <div class="edge-media" id="edge-media"></div>
  <div class="edge-body">
    <h2 id="edge-title"></h2>
    <p id="edge-desc"></p>
  </div>
</div>

<!-- gallery: text on top, horizontal image slider below -->
<div class="gallery-panel" id="layout-gallery">
  <div class="gallery-body">
    <h2 id="gallery-title"></h2>
    <p id="gallery-desc"></p>
  </div>
  <div class="gallery-slider" id="gallery-slider">
    <!-- images inserted dynamically -->
  </div>
</div>

</body>
</html>

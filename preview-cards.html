<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREVIEW — Card Stack</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/index.css">
<style>
html,body{overflow:hidden}
.controls{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;align-items:center;gap:12px;
  font:700 14px/1 monospace;letter-spacing:1px;
  border:2px solid #000;padding:8px 16px;background:#fff;
}
.controls button{
  font:700 16px/1 monospace;
  width:32px;height:32px;border:2px solid #000;background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.controls button:hover{background:#000;color:#fff}
.count{min-width:60px;text-align:center}
</style>
</head>
<body>

<div class="controls">
  <button id="btn-minus">−</button>
  <span class="count" id="card-count">6</span>
  <button id="btn-plus">+</button>
</div>

<!-- navigation -->
<div class="nav-top-left">
  <a href="about.html" data-i18n="about">[+] 简介与联系</a>
  <a href="changelog.html" data-i18n="changelog">[>] 进程日志</a>
</div>
<div class="nav-top-right" id="name-easter">泻火 曹浩轩</div>
<div class="nav-bottom-left">
  <a href="project-template.html?project=the-fet-mixer" data-i18n="linkFetMixer">THE FET MIXER</a>
  <a href="project-template.html?project=riverrun" data-i18n="linkRiverrun">riverrun</a>
  <a href="project-template.html?project=edgedgedge" data-i18n="linkNewWork">EDGEDGEDGE</a>
  <a href="project-template.html?project=spectral-dissector" data-i18n="linkSpectral">SPECTRAL DISSECTOR</a>
  <a href="project-template.html?project=ecce-homo" data-i18n="linkEcce">ECCE HOMO</a>
  <a href="project-template.html?project=wwhbh" data-i18n="linkWwbh">WE WILL HAVE BEEN HERE</a>
</div>
<div class="nav-bottom-right">
  <a href="#" id="lang-toggle" data-i18n="langToggle">[en] English</a>
</div>

<!-- card stack -->
<div class="stack-wrap" id="stack">
  <div class="card" data-href="project-template.html?project=the-fet-mixer">
    <div class="card-fallback" data-i18n="cardFetMixer">THE FET MIXER</div>
  </div>
  <div class="card lowercase" data-href="project-template.html?project=riverrun">
    <div class="card-fallback" data-i18n="cardRiverrun">riverrun</div>
  </div>
  <div class="card" data-href="project-template.html?project=edgedgedge">
    <div class="card-fallback" data-i18n="cardNewWork">EDGEDGEDGE</div>
    <img class="card-image" src="img/edgedgedge.jpg" alt="EDGEDGEDGE">
  </div>
  <div class="card" data-href="project-template.html?project=spectral-dissector">
    <div class="card-fallback" data-i18n="cardSpectral">SPECTRAL DISSECTOR</div>
  </div>
  <div class="card" data-href="project-template.html?project=ecce-homo">
    <div class="card-fallback" data-i18n="cardEcce">ECCE HOMO</div>
    <img class="card-image" src="img/ecce-homo.jpg" alt="ECCE HOMO">
  </div>
  <div class="card" data-href="project-template.html?project=wwhbh">
    <div class="card-fallback" data-i18n="cardWwbh">WE WILL HAVE BEEN HERE</div>
    <img class="card-image" src="img/wwhbh.jpg" alt="We Will Have Been Here">
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/i18n.js"></script>
<script src="js/i18n-common.js"></script>
<script src="js/nav.js"></script>
<script src="js/index-i18n.js"></script>

<script>
App.I18n.init(App.INDEX_I18N);

// easter egg
document.getElementById('name-easter').addEventListener('click', () => alert('我爱你'));

(function(){
  const stack = document.getElementById('stack');
  const countEl = document.getElementById('card-count');
  const cardNames = [
    { text:'THE FET MIXER', cls:'' },
    { text:'riverrun', cls:'lowercase' },
    { text:'EDGEDGEDGE', cls:'', img:'img/edgedgedge.jpg' },
    { text:'SPECTRAL DISSECTOR', cls:'' },
    { text:'ECCE HOMO', cls:'', img:'img/ecce-homo.jpg' },
    { text:'WE WILL HAVE BEEN HERE', cls:'', img:'img/wwhbh.jpg' },
    { text:'NEW PROJECT VII', cls:'' },
    { text:'NEW PROJECT VIII', cls:'' },
    { text:'NEW PROJECT IX', cls:'' },
    { text:'NEW PROJECT X', cls:'' },
    { text:'NEW PROJECT XI', cls:'' },
    { text:'NEW PROJECT XII', cls:'' },
    { text:'NEW PROJECT XIII', cls:'' },
    { text:'NEW PROJECT XIV', cls:'' },
    { text:'NEW PROJECT XV', cls:'' },
    { text:'NEW PROJECT XVI', cls:'' },
    { text:'NEW PROJECT XVII', cls:'' },
    { text:'NEW PROJECT XVIII', cls:'' },
    { text:'NEW PROJECT XIX', cls:'' },
    { text:'NEW PROJECT XX', cls:'' },
  ];

  let isAnimating = false;
  const ANIM_MS = 300;

  function reindex(){
    const children = [...stack.children];
    const len = children.length;
    const isMobile = window.innerWidth <= 768;
    const maxSpreadX = isMobile ? 70 : 110;
    const maxSpreadY = isMobile ? 12 : 20;
    const maxStepX = isMobile ? 14 : 22;
    const maxStepY = isMobile ? 2 : 4;
    const stepX = len > 1 ? Math.min(maxStepX, maxSpreadX / (len - 1)) : maxStepX;
    const stepY = len > 1 ? Math.min(maxStepY, maxSpreadY / (len - 1)) : maxStepY;
    children.forEach((card, i) => {
      const fromTop = len - 1 - i;
      card.style.zIndex = String(i + 1);
      card.style.transform = `translate(${fromTop * stepX}px, ${fromTop * stepY}px)`;
    });
    countEl.textContent = len;
  }

  reindex();

  function nextCard(){
    if(isAnimating) return;
    if(stack.children.length <= 1) return;
    isAnimating = true;
    const top = stack.lastElementChild;
    top.style.transition = `transform ${ANIM_MS}ms ease-out`;
    top.style.transform  = 'translateX(-100vw)';
    setTimeout(() => {
      top.style.transition = 'none';
      stack.prepend(top);
      const children = [...stack.children];
      children.forEach(c => c.style.transition = `transform ${ANIM_MS}ms ease-out`);
      reindex();
      setTimeout(() => {
        children.forEach(c => c.style.transition = 'none');
        isAnimating = false;
      }, ANIM_MS);
    }, ANIM_MS);
  }

  function prevCard(){
    if(isAnimating) return;
    if(stack.children.length <= 1) return;
    isAnimating = true;
    const bottom = stack.firstElementChild;
    bottom.style.transition = 'none';
    bottom.style.transform  = 'translateX(-100vw)';
    bottom.style.zIndex     = '999';
    stack.append(bottom);
    const children = [...stack.children];
    void bottom.offsetHeight;
    children.forEach(c => c.style.transition = `transform ${ANIM_MS}ms ease-out`);
    reindex();
    setTimeout(() => {
      children.forEach(c => c.style.transition = 'none');
      isAnimating = false;
    }, ANIM_MS);
  }

  // add / remove cards
  document.getElementById('btn-plus').addEventListener('click', () => {
    const len = stack.children.length;
    if(len >= 20) return;
    const info = cardNames[len] || { text:'NEW PROJECT', cls:'' };
    const card = document.createElement('div');
    card.className = 'card ' + info.cls;
    card.innerHTML = `<div class="card-fallback">${info.text}</div>` +
      (info.img ? `<img class="card-image" src="${info.img}" alt="${info.text}">` : '');
    // add to bottom of stack (firstChild)
    const children = [...stack.children];
    children.forEach(c => c.style.transition = `transform ${ANIM_MS}ms ease-out`);
    stack.prepend(card);
    reindex();
    setTimeout(() => {
      children.forEach(c => c.style.transition = 'none');
      card.style.transition = 'none';
    }, ANIM_MS);
  });

  document.getElementById('btn-minus').addEventListener('click', () => {
    if(stack.children.length <= 1) return;
    const children = [...stack.children];
    const bottom = stack.firstElementChild;
    children.forEach(c => c.style.transition = `transform ${ANIM_MS}ms ease-out`);
    stack.removeChild(bottom);
    reindex();
    setTimeout(() => {
      [...stack.children].forEach(c => c.style.transition = 'none');
    }, ANIM_MS);
  });

  // wheel
  let lastScrollTime = 0, previousDelta = 0;
  document.addEventListener('wheel', e => {
    e.preventDefault();
    if(isAnimating) return;
    const currentDelta = Math.max(Math.abs(e.deltaX), Math.abs(e.deltaY));
    const now = Date.now();
    if(now - lastScrollTime < 400){ previousDelta = currentDelta; return; }
    if(currentDelta > 40 && ((now - lastScrollTime) >= 1000 || currentDelta >= previousDelta)){
      const delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
      if(delta > 0) nextCard(); else prevCard();
      lastScrollTime = now;
    }
    previousDelta = currentDelta;
  }, { passive: false });

  stack.addEventListener('click', e => {
    const card = e.target.closest('.card');
    if(!card || isAnimating) return;
    nextCard();
  });

  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') nextCard();
    if(e.key === 'ArrowLeft')  prevCard();
  });
})();
</script>
</body>
</html>
